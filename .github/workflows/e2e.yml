name: E2E

# Label-gated Playwright run. The functional e2e specs (auth, log-session,
# account-delete, redirects, …) are valuable but historically brittle on copy
# assertions (see memory/feedback_pre_push_e2e_brittle.md — pricing "$20",
# auth "Your program, today."), so they do NOT run on every PR. Add the `e2e`
# label to a PR to run them when the change touches a flow worth exercising.
#
# Runs against an EPHEMERAL Postgres service container — never production.
# This is the structural fix for the 2026-04-21 incident where Playwright's
# webServer inherited .env.local prod Supabase creds. playwright.config.ts +
# e2e/global-setup.ts also refuse any non-localhost DB as belt-and-suspenders.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    # Only run when the PR carries the `e2e` label.
    if: contains(github.event.pull_request.labels.*.name, 'e2e')
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: podium_throws_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # localhost URL satisfies the prod-DB guardrails in playwright.config.ts
      # and e2e/global-setup.ts (both throw on any non-local host).
      E2E_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/podium_throws_e2e?schema=public
      POSTGRES_PRISMA_URL: postgresql://postgres:postgres@localhost:5432/podium_throws_e2e?schema=public
      POSTGRES_URL_NON_POOLING: postgresql://postgres:postgres@localhost:5432/podium_throws_e2e?schema=public

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Ensure psql client (global-setup sanity-checks the seed via psql)
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply migrations to ephemeral DB
        run: npx prisma migrate deploy

      - name: Seed test accounts
        run: npm run db:seed

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run functional e2e specs
        # Only the functional projects — the *-screenshots projects are visual
        # harnesses (no assertions) and don't belong in a pass/fail gate.
        # `setup` runs automatically as a dependency of coach/athlete.
        run: npm run test:e2e -- --project=no-auth --project=coach --project=athlete

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
